---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: cron
      cronjob: 0 6 * * *
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: cron
      cronjob: 0 6 * * *
    groups:
      boto3:
        patterns:
          - boto3
          - types-boto3-lite*
